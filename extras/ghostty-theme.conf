# Void Odyssey — Ghostty terminal theme
# Generated from palette.json via `npm run build`.
# Install: copy this file to ~/.config/ghostty/themes/Void\ Odyssey
# Then add `theme = Void Odyssey` to ~/.config/ghostty/config

# Base colors
background = #0D0F14
foreground = #E2E6F0
cursor-color = #00F0FF
selection-background = #9A6EF0
selection-foreground = #E2E6F0

# Appearance
background-opacity = 0.95
background-blur-radius = 20
cursor-style = block
cursor-style-blink = false
font-size = 13
minimum-contrast = 3.0

# ANSI palette
# Normal colors
palette = 0=#1A1E28
palette = 1=#F04040
palette = 2=#2DD65B
palette = 3=#E8C320
palette = 4=#4DA8FF
palette = 5=#9A6EF0
palette = 6=#0AAFBE
palette = 7=#8891AA
# Bright colors
palette = 8=#4A5168
palette = 9=#FF6B6B
palette = 10=#5FED83
palette = 11=#FFC44D
palette = 12=#7DC4FF
palette = 13=#B48AFF
palette = 14=#00D4E6
palette = 15=#E2E6F0
